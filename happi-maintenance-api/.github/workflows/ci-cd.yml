name: HappiMaintenance API PROD

on:
  push:
    branches:
      - main

env:
  ACR_NAME: happiregistry2025
  AKS_RESOURCE_GROUP: rg-happimaintenance
  AKS_CLUSTER_NAME: happi-aks
  IMAGE_NAME: happi-api
  K8S_NAMESPACE: happimaintenance

jobs:

  # -----------------------------
  # Job 1: Run Tests
  # -----------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short


  # -----------------------------
  # Job 2: Build & Deploy
  # -----------------------------
  build-and-deploy:
    name: Build & Deploy to AKS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Login to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Login to ACR
      - name: Login to ACR
        run: |
          az acr login --name $ACR_NAME

      # Build & Push Docker Image
      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ github.run_number }}

          FULL_IMAGE=${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${IMAGE_TAG}
          LATEST_IMAGE=${ACR_NAME}.azurecr.io/${IMAGE_NAME}:latest

          docker build -t $FULL_IMAGE -t $LATEST_IMAGE .

          docker push $FULL_IMAGE
          docker push $LATEST_IMAGE

          echo "FULL_IMAGE=$FULL_IMAGE" >> $GITHUB_ENV

      # Get AKS credentials
      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group $AKS_RESOURCE_GROUP \
            --name $AKS_CLUSTER_NAME \
            --overwrite-existing

      # Apply Kubernetes manifests
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/ -n $K8S_NAMESPACE

      # Update deployment image
      - name: Update deployment image
        run: |
          kubectl set image deployment/happi-api \
          happi-api=${{ env.FULL_IMAGE }} \
          -n $K8S_NAMESPACE

      # Wait for rollout
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/happi-api \
          -n $K8S_NAMESPACE --timeout=120s