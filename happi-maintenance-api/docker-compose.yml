version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - DATABASE_NAME=happimaintain
      - JWT_SECRET=local-dev-secret
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      - mongo
    volumes:
      - ./app:/app/app   # hot-reload in dev

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
