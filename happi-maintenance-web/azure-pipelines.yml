trigger:
  branches:
    include:
      - main

variables:
  - name: ACR_NAME
    value: "happiregistry2025"  # Update with your actual ACR name
  - name: AKS_RESOURCE_GROUP
    value: "rg-happimaintenance"
  - name: AKS_CLUSTER_NAME
    value: "happi-aks"
  - name: IMAGE_NAME
    value: "happi-web"
  - name: K8S_NAMESPACE
    value: "happimaintenance"
  - name: INGRESS_IP
    value: "20.99.183.136"  # Update after AKS Ingress is provisioned

stages:
  # ---- Stage 1: Test ----
  - stage: Test
    displayName: "Lint & Build Check"
    jobs:
      - job: LintAndBuild
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "22.x"
            displayName: "Use Node.js 22"

          - script: npm ci
            displayName: "Install dependencies"

          - script: npm run lint
            displayName: "Run ESLint"

          - script: npm run build
            displayName: "Build check"
            env:
              NEXT_PUBLIC_API_URL: "http://api.localhost.nip.io"

  # ---- Stage 2: Build & Deploy ----
  - stage: BuildAndDeploy
    displayName: "Build & Deploy to AKS"
    dependsOn: Test
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildAndPush
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: AzureCLI@2
            inputs:
              azureSubscription: "azure-service-connection"  # Update with your service connection name
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                # Login to ACR
                az acr login --name $(ACR_NAME)

                # Build and tag image with API URL baked in
                IMAGE_TAG=$(Build.BuildId)
                FULL_IMAGE="$(ACR_NAME).azurecr.io/$(IMAGE_NAME):${IMAGE_TAG}"
                LATEST_IMAGE="$(ACR_NAME).azurecr.io/$(IMAGE_NAME):latest"

                docker build \
                  --build-arg NEXT_PUBLIC_API_URL="http://api.$(INGRESS_IP).nip.io" \
                  -t ${FULL_IMAGE} -t ${LATEST_IMAGE} .
                docker push ${FULL_IMAGE}
                docker push ${LATEST_IMAGE}

                # Get AKS credentials
                az aks get-credentials \
                  --resource-group $(AKS_RESOURCE_GROUP) \
                  --name $(AKS_CLUSTER_NAME) \
                  --overwrite-existing

                # Apply k8s manifests
                kubectl apply -f k8s/ -n $(K8S_NAMESPACE)

                # Update deployment image
                kubectl set image deployment/happi-web \
                  happi-web=${FULL_IMAGE} \
                  -n $(K8S_NAMESPACE)

                # Wait for rollout
                kubectl rollout status deployment/happi-web \
                  -n $(K8S_NAMESPACE) --timeout=120s
            displayName: "Build, Push & Deploy"
